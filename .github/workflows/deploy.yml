name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ADD THIS STEP TO FIX THE ERROR:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # This satisfies the Astro 6.0 requirement

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # The Astro action will now find Node 22 and succeed

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4